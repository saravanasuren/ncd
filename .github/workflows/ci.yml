name: CI
on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build shared
        run: npm run build -w @new-wealth/shared
      - name: Typecheck
        run: npm run typecheck
      - name: Test (money math + domain engine)
        run: npm test
      - name: Build web
        run: npm run build -w @new-wealth/web
