# Dhanam New Wealth — nginx server block (co-tenant #5).
# Serves the React SPA (immutable hashed assets) and proxies /api → :3020.
# Host: ncd.dhanamfinance.com. Run certbot for it (see DEPLOY.md §2).
# NEVER edit the other four apps' nginx blocks.

server {
    listen 80;
    server_name ncd.dhanamfinance.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name ncd.dhanamfinance.com;

    ssl_certificate     /etc/letsencrypt/live/ncd.dhanamfinance.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ncd.dhanamfinance.com/privkey.pem;

    root /home/ubuntu/ncd/web/dist;
    index index.html;

    # API → Node service on :3020.
    location /api/ {
        proxy_pass http://127.0.0.1:3020;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Vite-hashed assets are immutable — cache hard.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — index.html is never cached (so a new build is picked up).
    location / {
        add_header Cache-Control "no-cache";
        try_files $uri /index.html;
    }

    client_max_body_size 6m;  # receipt / KYC-doc uploads
}
